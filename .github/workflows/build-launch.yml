name: Build, Package, and Launch Check

on:
  workflow_dispatch:
    inputs:
      publish_images:
        description: 'Push API and Web images to GitHub Container Registry'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_compose_smoke:
        description: 'Launch the Docker Compose stack inside Actions and smoke test it'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: build-launch-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ltl-tool-detection-planner-and-booker

jobs:
  validate:
    name: Validate API, Web, and SQL Migration
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'Ltl_CI_p@ssw0rd!'
        ports:
          - 1433:1433
    env:
      LTLTOOL_SQLSERVER_TEST_CONNECTION: 'Server=127.0.0.1,1433;Database=master;User Id=sa;Password=Ltl_CI_p@ssw0rd!;TrustServerCertificate=True;Encrypt=False'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore API
        run: dotnet restore

      - name: Build API
        run: dotnet build --no-restore -c Release

      - name: Test API
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Wait for SQL Server
        run: |
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL Server is accepting connections."
              sleep 5
              exit 0
            fi
            echo "Waiting for SQL Server... ($i)"
            sleep 2
          done
          echo "SQL Server did not become available in time." >&2
          exit 1

      - name: Verify SQL Server migrations
        run: dotnet test --no-build -c Release --verbosity normal --filter "Category=SqlServerMigration"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build -- --configuration production

  package:
    name: Build and Publish Container Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event.inputs.publish_images == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata - API
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata - Web
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/LtlTool.Api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Image summary
        run: |
          echo "## Published images" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ env.IMAGE_PREFIX }}-api" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ env.IMAGE_PREFIX }}-web" >> "$GITHUB_STEP_SUMMARY"

  compose-smoke:
    name: Launch Stack and Smoke Test
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event.inputs.run_compose_smoke == 'true'
    env:
      MSSQL_SA_PASSWORD: 'Ltl_CI_p@ssw0rd!'
      ALLOWED_EMAIL_DOMAIN: ''
      ALVYS_PROVIDER: 'Fallback'
      ALVYS_WRITEBACK_MODE: 'Disabled'
      AZURE_AD_TENANT_ID: ''
      AZURE_AD_API_CLIENT_ID: ''
      AZURE_AD_CLIENT_SECRET: ''
      AZURE_AD_WEB_CLIENT_ID: ''
      AZURE_AD_API_SCOPE: ''
    steps:
      - uses: actions/checkout@v4

      - name: Build and launch Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5072/api/health >/dev/null; then
              echo "API health check passed."
              exit 0
            fi
            echo "Waiting for API health... ($i)"
            docker compose ps
            sleep 5
          done
          docker compose logs api
          exit 1

      - name: Wait for Web shell
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4200 >/dev/null; then
              echo "Web shell is reachable."
              exit 0
            fi
            echo "Waiting for Web shell... ($i)"
            docker compose ps
            sleep 5
          done
          docker compose logs web
          exit 1

      - name: Summarize local launch
        run: |
          echo "## Launch smoke test passed" >> "$GITHUB_STEP_SUMMARY"
          echo "The stack was built and launched inside the GitHub Actions runner." >> "$GITHUB_STEP_SUMMARY"
          echo "GitHub-hosted runners are ephemeral, so this URL is not public after the job completes." >> "$GITHUB_STEP_SUMMARY"
          echo "For public UAT, run \`make demo-up\` from a machine with Docker and NGROK_AUTHTOKEN configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
