name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  # Scheduled canary against main. Runs every 4 hours so we notice quickly when the demo
  # stack rots — Alvys DTO drift, credential rotation, docker-compose regression — or
  # when the pilot corridor comes back to life (plan-preview spec starts firing its
  # driver-RPM assertion). Cron minutes offset to 17 to spread load away from the top of
  # the hour where hosted-runner queues often spike.
  schedule:
    - cron: '17 */4 * * *'
  # Manual trigger for on-demand smoke tests without a code change.
  workflow_dispatch: {}

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release --verbosity normal

  api-surface-contract:
    # Phase 0 stability guard. Runs only the API-surface contract tests
    # (Category=ApiSurfaceContract) as a standalone, visibly-named check so an accidental
    # route/verb rename or deletion of a CLAUDE.md § "Current API surface (preserve)"
    # endpoint fails CI with an obvious signal instead of hiding inside the broader `api`
    # job output. Covers both the reflection-over-the-route-table manifest test
    # (LtlApiSurfaceManifestTests) and the unauthenticated 401-probe test
    # (LtlApiSurfaceContractTests).
    name: Verify API Surface Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - name: Assert documented LTL API surface is preserved
        run: dotnet test --no-build -c Release --verbosity normal --filter "Category=ApiSurfaceContract"

  migration-sqlserver:
    name: Verify EF Migrations on SQL Server
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          # Ephemeral, throwaway credential scoped to this CI run only — never used outside the job
          # and not a production secret. SQL Server requires a "strong" SA password to start.
          MSSQL_SA_PASSWORD: 'Ltl_CI_p@ssw0rd!'
        ports:
          - 1433:1433
    env:
      # Master-scoped connection string; the migration test swaps in a unique per-run database.
      LTLTOOL_SQLSERVER_TEST_CONNECTION: 'Server=127.0.0.1,1433;Database=master;User Id=sa;Password=Ltl_CI_p@ssw0rd!;TrustServerCertificate=True;Encrypt=False'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Wait for SQL Server
        run: |
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/1433) >/dev/null 2>&1; then
              echo "SQL Server is accepting connections."
              # Give the engine a moment to finish login-readiness after the port opens;
              # the test also enables EF connection retry to cover the remaining window.
              sleep 5
              exit 0
            fi
            echo "Waiting for SQL Server... ($i)"
            sleep 2
          done
          echo "SQL Server did not become available in time." >&2
          exit 1
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - name: Run SQL Server migration verification tests
        run: dotnet test --no-build -c Release --verbosity normal --filter "Category=SqlServerMigration"

  web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build -- --configuration production

  web-test:
    name: Test Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      # ubuntu-latest ships Chrome preinstalled; setup-chrome is a belt-and-suspenders
      # guard so the job keeps working if the runner image ever drops it.
      - name: Ensure Chrome is available for ChromeHeadless
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - run: npm ci
      # `npm test` runs `ng test --watch=false --browsers=ChromeHeadless` (see web/package.json).
      # Angular's @angular/build:karma builder picks up the Chrome binary automatically.
      - run: npm test

  trailer-fit:
    # Phase 2 M2 packing sidecar (services/trailer-fit). Pure-Python FastAPI wrapper
    # around the vendored MIT ytl optimizer — independent of the .NET/Angular jobs.
    name: Trailer-Fit Sidecar (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/trailer-fit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check
      - name: Test (pytest)
        run: pytest

  e2e-demo:
    # End-to-end walkthrough of the demo stack against live Alvys reads. Boots the same
    # docker-compose the local runbook uses (scripts/demo-up.sh -> AccessPolicy:Mode=Demo),
    # then runs `test:e2e:ci` (headless Playwright). Uploads the HTML report + traces on
    # failure so a broken workflow is diagnosable without re-running locally.
    #
    # Requires the ALVYS_CLIENT_SECRET repo secret. Without it, the job skips gracefully:
    # a fork PR or a first-time contributor can still merge without seeing a red X they
    # can't fix.
    #
    # continue-on-error is intentional. Live-data variance (Alvys tenant has no open
    # Laredo->Dallas loads at the moment) or transient Alvys API blips must not block a
    # main-branch merge — the plan-preview spec already test.skip()s on empty candidate
    # lists, but network / rate-limit flakes should still surface as a warning, not a
    # hard failure. Tighten to hard-block later once the flake rate is measured.
    name: E2E Demo Stack (Playwright)
    runs-on: ubuntu-latest
    needs: [api, web]
    continue-on-error: true
    env:
      # Consumed by docker-compose.yml. Everything else stays at its .env.demo.example default.
      ACCESS_POLICY_MODE: Demo
      ALVYS_PROVIDER: Live
      ALVYS_API_BASE_URL: https://integrations.alvys.com
      ALVYS_API_VERSION: v1
      ALVYS_TENANT_ID: va336
      ALVYS_CLIENT_ID: MZEDvQYVZmcEtk3f17QFgYTg19pa3eJL
      ALVYS_WRITEBACK_MODE: Disabled
      LTL_DETECTION_ENABLED: 'true'
      LTL_DEFAULT_TIMEZONE: America/Chicago
      # Phase 2 optimization flags ON so the E2E exercises the real engines against live
      # Alvys reads (read-only decision-support compute — no Alvys writes). The trailer-fit
      # sidecar comes up as part of the compose stack.
      LTL_TRAILER_FIT_ENABLED: 'true'
      LTL_SOLVER_ENABLED: 'true'
      LTL_AGENT_COMMANDS_ENABLED: 'true'
      MSSQL_SA_PASSWORD: 'Ltl_CI_p@ssw0rd!'
      # Placeholder GUIDs so MSAL's greedy option validation doesn't crash the API at build
      # time. The AuthenticationSchemeRouter forwards to DemoAuthenticationHandler in Demo
      # mode, so JwtBearer is never actually invoked — but its options still materialize.
      AZURE_AD_TENANT_ID: '00000000-0000-0000-0000-000000000000'
      AZURE_AD_API_CLIENT_ID: '00000000-0000-0000-0000-000000000000'
      AZURE_AD_WEB_CLIENT_ID: '00000000-0000-0000-0000-000000000000'
      AZURE_AD_API_SCOPE: 'api://00000000-0000-0000-0000-000000000000/.default'
    steps:
      - uses: actions/checkout@v4

      - name: Check for Alvys secret
        id: check-secret
        env:
          ALVYS_CLIENT_SECRET_PRESENT: ${{ secrets.ALVYS_CLIENT_SECRET != '' }}
        run: |
          if [ "$ALVYS_CLIENT_SECRET_PRESENT" = "true" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ALVYS_CLIENT_SECRET repo secret is not set; skipping E2E."
            echo "::warning::Add the va336 Alvys client secret under Settings > Secrets > Actions."
          fi

      - name: Boot the demo stack (docker compose up)
        if: steps.check-secret.outputs.has_secret == 'true'
        env:
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Wait for API health + assert authMode=Demo
        if: steps.check-secret.outputs.has_secret == 'true'
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 240 ))
          while true; do
            if BODY=$(curl -fsS http://localhost:5072/api/health 2>/dev/null); then
              echo "API healthy. Body: $BODY"
              break
            fi
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "::error::API failed to report healthy within 240s"
              docker compose logs api | tail -100
              exit 1
            fi
            sleep 4
          done
          AUTH_MODE=$(printf '%s' "$BODY" | sed -n 's/.*"authMode"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          if [ "$AUTH_MODE" != "Demo" ]; then
            echo "::error::authMode=$AUTH_MODE, expected Demo"
            exit 1
          fi

      - name: Wait for web to be reachable
        if: steps.check-secret.outputs.has_secret == 'true'
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 120 ))
          while ! curl -fsS http://localhost:4200 >/dev/null 2>&1; do
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "::error::web SPA failed to respond within 120s"
              docker compose logs web | tail -50
              exit 1
            fi
            sleep 3
          done

      - uses: actions/setup-node@v4
        if: steps.check-secret.outputs.has_secret == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps + Playwright browsers
        if: steps.check-secret.outputs.has_secret == 'true'
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright suite
        if: steps.check-secret.outputs.has_secret == 'true'
        working-directory: web
        env:
          WEB_URL: http://localhost:4200
          API_URL: http://localhost:5072
          CI: '1' # strips the visual-pause between steps (see e2e/demo-workflow.spec.ts)
        run: npm run test:e2e:ci

      # Dock stakeholder demo (e2e/dock-demo.spec.ts). Runs as its own project so the recorded
      # .webm lands at a predictable path (web/test-results/dock-demo/) for the artifact upload
      # below. `video: 'on'` in playwright.config.ts produces the recording. Kept non-blocking
      # like the rest of this job (continue-on-error at the job level) — a live-data skip or an
      # Alvys blip must not fail a main-branch merge.
      - name: Run dock stakeholder demo (video)
        if: steps.check-secret.outputs.has_secret == 'true'
        working-directory: web
        env:
          WEB_URL: http://localhost:4200
          API_URL: http://localhost:5072
          CI: '1'
        run: npx playwright test --project=dock-demo

      - name: Upload dock demo video
        if: always() && steps.check-secret.outputs.has_secret == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dock-demo-video
          path: |
            web/test-results/dock-demo
          retention-days: 14
          if-no-files-found: warn

      # Always upload the Playwright report + test-results — not just on failure. The
      # test-results/tour/ folder contains the demo-tour PNGs (see web/e2e/demo-tour.spec.ts),
      # which operators + leadership use to review the demo without booting the stack.
      - name: Upload Playwright report
        if: always() && steps.check-secret.outputs.has_secret == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          retention-days: 14
          if-no-files-found: warn

      - name: Upload docker compose logs on failure
        if: failure() && steps.check-secret.outputs.has_secret == 'true'
        run: |
          mkdir -p compose-logs
          docker compose logs --no-color api > compose-logs/api.log 2>&1 || true
          docker compose logs --no-color web > compose-logs/web.log 2>&1 || true
          docker compose logs --no-color sqlserver > compose-logs/sqlserver.log 2>&1 || true

      - name: Upload compose logs artifact
        if: failure() && steps.check-secret.outputs.has_secret == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs
          retention-days: 14

      - name: Tear down stack
        if: always() && steps.check-secret.outputs.has_secret == 'true'
        run: docker compose down -v
