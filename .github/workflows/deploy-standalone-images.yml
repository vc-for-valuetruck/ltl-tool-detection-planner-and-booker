name: Deploy standalone images

# Auto-deploys new API + Web images to the ltl-standalone Azure stack on every
# push to main. Uses ACR admin credentials + App Service publish credentials
# — NOT an OIDC service principal. Requires zero subscription-scope RBAC.
#
# Pipeline:
#   1. Docker login to ACR with admin credentials
#   2. Build API image (docker buildx) and push to ACR
#   3. When optimization_flags=on, build a thin overlay on the API image that bakes
#      the solver + agent-command flags into ENV, and push it as :latest (Kudu app
#      settings do not persist on this Linux App Service, so the image is the only
#      reliable channel — see the overlay step for the verification details).
#   4. Build Web image (docker buildx) and push to ACR
#   5. Update each App Service container config via the Kudu REST API,
#      pointing it at the new image tag
#   6. Restart both App Services via Kudu
#   7. Smoke test /api/health for authMode=Demo

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'web/**'
      - '.github/workflows/deploy-standalone-images.yml'
  workflow_dispatch:
    inputs:
      optimization_flags:
        description: >-
          Toggle the LTL optimization feature flags (solver + agent commands) as
          Kudu app settings on the API App Service. Reversible without a redeploy
          by re-running with this set to "off".
        type: choice
        options:
          - 'on'
          - 'off'
        default: 'on'

permissions:
  contents: read

concurrency:
  group: deploy-standalone-${{ github.ref }}
  cancel-in-progress: false

env:
  API_APP: ltl-standalone-api
  WEB_APP: ltl-standalone-web
  ACR_LOGIN: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  deploy:
    name: Build + push + reconfigure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets
        shell: bash
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          LTL_API_SCM_PASSWORD: ${{ secrets.LTL_API_SCM_PASSWORD }}
          LTL_WEB_SCM_PASSWORD: ${{ secrets.LTL_WEB_SCM_PASSWORD }}
        run: |
          missing=()
          for name in ACR_USERNAME ACR_PASSWORD ACR_LOGIN_SERVER LTL_API_SCM_PASSWORD LTL_WEB_SCM_PASSWORD; do
            [ -z "${!name}" ] && missing+=("$name")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Resolve image tag
        id: vars
        run: echo "image_tag=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/LtlTool.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ltl-api:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/ltl-api:latest

      - name: Build + push API optimization-flags overlay image
        # Only when optimization_flags=on. Push events carry no input, so default to
        # "on" to match the API config step below.
        if: ${{ (github.event.inputs.optimization_flags || 'on') == 'on' }}
        env:
          ACR_LOGIN: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          # Why an overlay image instead of app settings: the Kudu /api/settings POST
          # does NOT persist site app settings on this Linux App Service (verified in
          # deploy run 29751123024 — the POST returned 2xx and logged the flags, the
          # restart ran, yet /api/health/optimization still reported every flag false).
          # The only channel that actually reaches the running container is the image
          # it pulls on restart (:latest). So when optimization_flags=on we bake the
          # solver + agent-command flags into a thin overlay on top of the API image we
          # just pushed, then publish it as :latest so the restart picks it up.
          #
          # TrailerFit stays unset (=> disabled) on purpose: it needs its OR-Tools
          # sidecar App Service, and there is no sidecar host in the standalone RG (no
          # ARM/OIDC in this stack to provision one). With no sidecar the TrailerFit
          # verdict is Null — surfaced honestly as "verify at dock", never coerced.
          BASE="${ACR_LOGIN}/ltl-api:${IMAGE_TAG}"
          echo "Building optimization-flags overlay on top of $BASE"
          docker buildx build \
            --push \
            --build-arg BASE_IMAGE="$BASE" \
            -t "${ACR_LOGIN}/ltl-api:${IMAGE_TAG}-flags" \
            -t "${ACR_LOGIN}/ltl-api:latest" \
            -f - . <<'DOCKERFILE'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          ENV Ltl__Optimization__Solver__Enabled=true
          ENV Ltl__Optimization__AgentCommands__Enabled=true
          DOCKERFILE

      - name: Build + push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ltl-web:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/ltl-web:latest

      - name: Update API App Service container config
        env:
          APP: ${{ env.API_APP }}
          SCM_PASS: ${{ secrets.LTL_API_SCM_PASSWORD }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          ACR_LOGIN: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          # Use SCM basic auth to hit the Kudu REST API and update the DOCKER_* env
          # vars. Docker image name is set via DOCKER_CUSTOM_IMAGE_NAME setting.
          IMG="${ACR_LOGIN}/ltl-api:${IMAGE_TAG}"
          AUTH="Basic $(printf '$%s:%s' "$APP" "$SCM_PASS" | base64 -w0)"
          echo "Setting $APP image to $IMG"

          # NOTE: the Ltl__Optimization__* feature flags are intentionally NOT sent
          # here. Kudu /api/settings does NOT persist site app settings on this Linux
          # App Service (verified in deploy run 29751123024 — POST returned 2xx and the
          # restart ran, but /api/health/optimization still reported every flag false).
          # The flags are instead baked into the API image itself (see the
          # "Build + push API optimization-flags overlay image" step above), which the
          # container reliably picks up via the :latest pull on restart. Only the
          # DOCKER_* registry/image settings are pushed here.
          #
          # Update the image via the ARM proxy exposed on the SCM host — the
          # /api/settings endpoint on Kudu takes a settings dict. Writeback and
          # Alvys__InternalApi settings are intentionally NOT touched here.
          curl -sf -X POST \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            "https://${APP}.scm.azurewebsites.net/api/settings" \
            -d "{
              \"DOCKER_CUSTOM_IMAGE_NAME\": \"$IMG\",
              \"DOCKER_REGISTRY_SERVER_URL\": \"https://${ACR_LOGIN}\",
              \"DOCKER_REGISTRY_SERVER_USERNAME\": \"${ACR_USER}\",
              \"DOCKER_REGISTRY_SERVER_PASSWORD\": \"${ACR_PASS}\"
            }" || echo "::warning::Kudu settings POST failed — will rely on 'latest' tag pull"

      - name: Update Web App Service container config
        env:
          APP: ${{ env.WEB_APP }}
          SCM_PASS: ${{ secrets.LTL_WEB_SCM_PASSWORD }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          ACR_LOGIN: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          IMG="${ACR_LOGIN}/ltl-web:${IMAGE_TAG}"
          AUTH="Basic $(printf '$%s:%s' "$APP" "$SCM_PASS" | base64 -w0)"
          echo "Setting $APP image to $IMG"

          curl -sf -X POST \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            "https://${APP}.scm.azurewebsites.net/api/settings" \
            -d "{
              \"DOCKER_CUSTOM_IMAGE_NAME\": \"$IMG\",
              \"DOCKER_REGISTRY_SERVER_URL\": \"https://${ACR_LOGIN}\",
              \"DOCKER_REGISTRY_SERVER_USERNAME\": \"${ACR_USER}\",
              \"DOCKER_REGISTRY_SERVER_PASSWORD\": \"${ACR_PASS}\"
            }" || echo "::warning::Kudu settings POST failed — will rely on 'latest' tag pull"

      - name: Restart App Services via Kudu
        env:
          API_APP: ${{ env.API_APP }}
          WEB_APP: ${{ env.WEB_APP }}
          API_SCM_PASS: ${{ secrets.LTL_API_SCM_PASSWORD }}
          WEB_SCM_PASS: ${{ secrets.LTL_WEB_SCM_PASSWORD }}
        run: |
          for app_var in "API_APP:API_SCM_PASS" "WEB_APP:WEB_SCM_PASS"; do
            app_name_var="${app_var%:*}"
            pass_var="${app_var#*:}"
            app="${!app_name_var}"
            pass="${!pass_var}"
            AUTH="Basic $(printf '$%s:%s' "$app" "$pass" | base64 -w0)"

            # Trigger a container restart by touching the settings, then hitting /restart.
            # Kudu's /api/processes/-1 GET is a lightweight ping; /api/restart is the real op.
            echo "Restarting $app..."
            curl -sf -X POST -H "Authorization: $AUTH" \
              "https://${app}.scm.azurewebsites.net/api/restart" \
              || echo "::warning::Restart POST for $app returned non-200; container will pull new tag on next natural cycle"
          done

      - name: Smoke test — /api/health authMode=Demo
        run: |
          API_URL="https://${{ env.API_APP }}.azurewebsites.net"
          WEB_URL="https://${{ env.WEB_APP }}.azurewebsites.net"

          # Poll up to 5 min for authMode=Demo
          deadline=$(( $(date +%s) + 300 ))
          mode=""
          while [ $(date +%s) -lt $deadline ]; do
            body=$(curl -sf "$API_URL/api/health" 2>/dev/null || true)
            if [ -n "$body" ]; then
              mode=$(echo "$body" | grep -oE '"authMode"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4)
              if [ "$mode" = "Demo" ]; then break; fi
            fi
            sleep 10
          done

          if [ "$mode" != "Demo" ]; then
            echo "::error::authMode was '$mode', expected 'Demo'"
            {
              echo "## ✗ Deploy smoke test failed"
              echo ""
              echo "- Web: $WEB_URL"
              echo "- API: $API_URL/api/health"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "## ✓ LTL standalone deployed"
            echo ""
            echo "- **Web:** $WEB_URL/ltl"
            echo "- **API:** $API_URL/api"
            echo "- **Health:** $API_URL/api/health (authMode=Demo verified)"
            echo ""
            echo "Image tag: \`${{ steps.vars.outputs.image_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Show top-3 consolidation opportunities in the run summary
        run: |
          API_URL="https://${{ env.API_APP }}.azurewebsites.net"
          OPP=$(curl -sf "$API_URL/api/ltl/consolidation/opportunities?limit=3" 2>/dev/null || echo "")
          if [ -z "$OPP" ]; then
            echo "::warning::Opportunities endpoint returned empty"
            exit 0
          fi
          {
            echo ""
            echo "### Today's top 3 consolidation opportunities"
            echo ""
            echo '```json'
            echo "$OPP" | python3 -m json.tool
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
