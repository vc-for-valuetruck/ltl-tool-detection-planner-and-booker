name: OIDC diag
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Secret sanity
        env:
          T: ${{ secrets.AZURE_TENANT_ID }}
          C: ${{ secrets.AZURE_CLIENT_ID }}
          S: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          X: ${{ secrets.TEST_SECRET_DIAG }}
        run: |
          echo "tenant length: ${#T}"
          echo "client length: ${#C}"
          echo "sub    length: ${#S}"
          echo "test   length: ${#X}"
          # Check whether the tenant looks like a GUID
          if [[ "$T" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "tenant is a valid GUID"
          else
            echo "tenant is NOT a GUID"
          fi
          # md5 check to prove exact content
          echo "tenant md5: $(echo -n "$T" | md5sum | cut -d' ' -f1)"
          echo "test   md5: $(echo -n "$X" | md5sum | cut -d' ' -f1)"
