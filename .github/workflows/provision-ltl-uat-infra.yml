name: Provision LTL Tool UAT infrastructure

# Manual-trigger only. This workflow creates real Azure resources and real Microsoft Entra
# app registrations — it must never run on push/PR. Re-running is safe for the ARM-managed
# resources (infra/uat/main.bicep is idempotent) and for the Entra app registrations (skipped if
# an app with the same display name already exists), but it does NOT rotate an existing API
# client secret on repeat runs, so a secret is only ever generated once per app.
on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: UAT resource group
        required: true
        default: ltl-uat-rg
        type: string
      location:
        description: Azure region
        required: true
        default: centralus
        type: string
      base_name:
        description: Base name for UAT resources
        required: true
        default: ltl-uat
        type: string
      sql_database_sku:
        description: 'Azure SQL Database SKU (e.g. Basic, S0, S1)'
        required: false
        default: S0
        type: string
      yard_managed_identity_object_id:
        description: >-
          Optional. Object (principal) id of Yard's managed identity / service principal. When
          supplied, the YardEvents.Ingest app role is granted to it so Yard's client-credentials
          token carries the role. Leave blank to only define the role (assign it later once Yard's
          identity is known).
        required: false
        default: ''
        type: string
      existing_api_client_id:
        description: >-
          Optional. Application (client) id of a pre-created API Entra app registration. When
          supplied together with existing_spa_client_id, this workflow skips the `az ad app
          create` steps entirely — so it can be run by a service principal that lacks the
          tenant-level Entra "Application Developer" role. Have a directory admin create the two
          app registrations manually (see docs/AZURE_UAT_DEPLOY.md) and paste the app ids here.
        required: false
        default: ''
        type: string
      existing_spa_client_id:
        description: >-
          Optional. Application (client) id of a pre-created SPA (web) Entra app registration.
          Must be supplied together with existing_api_client_id — both go together.
        required: false
        default: ''
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: provision-ltl-uat-infra
  cancel-in-progress: false

jobs:
  provision:
    name: Provision UAT infrastructure + Entra app registrations
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Azure login with ltl-uat-github-deploy
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Step 0 preflight -- fail fast with a legible error before Bicep tries to create resources
      # and returns a cryptic AuthorizationFailed. Reading role assignments only requires being
      # able to log in (which we just did), so this step never adds a new permission requirement.
      # See docs/AZURE_UAT_DEPLOY.md "Step 0 -- Grant the deploy service principal the Contributor role".
      - name: Preflight - deploy SP has Contributor on the resource group
        shell: bash
        run: |
          set -euo pipefail
          APP_ID="${{ secrets.AZURE_CLIENT_ID }}"
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ github.event.inputs.resource_group }}"
          RG_SCOPE="/subscriptions/$SUB/resourceGroups/$RG"
          SUB_SCOPE="/subscriptions/$SUB"

          # We include-inherited so a subscription-scoped Contributor satisfies the RG-scoped check.
          # Role names that satisfy the requirement: Contributor OR Owner (both are supersets of what
          # Bicep + ACR build + App Service + SQL will need).
          ROLES=$(az role assignment list \
            --assignee "$APP_ID" \
            --scope "$RG_SCOPE" \
            --include-inherited \
            --query "[?roleDefinitionName=='Contributor' || roleDefinitionName=='Owner'].[roleDefinitionName, scope]" \
            -o tsv || true)

          if [ -z "$ROLES" ]; then
            echo "::error::Deploy service principal ($APP_ID) does not have Contributor on resource group $RG."
            echo ""
            echo "This is the Step 0 blocker documented in docs/AZURE_UAT_DEPLOY.md."
            echo ""
            echo "Fix (Path B - Portal, ~90 seconds):"
            echo "  1. Portal -> Resource groups -> $RG"
            echo "  2. Left nav -> Access control (IAM) -> + Add -> Add role assignment"
            echo "  3. Role: Contributor"
            echo "  4. Members: ltl-uat-github-deploy (client id $APP_ID)"
            echo "  5. Review + assign"
            echo "  6. Re-run this workflow."
            echo ""
            echo "If you cannot grant the role yourself, see docs/AZURE_UAT_DEPLOY.md Path C for how to delegate."
            exit 1
          fi

          echo "::notice::Deploy SP has the required role on $RG:"
          printf '%s\n' "$ROLES"

      - name: Ensure resource group exists
        shell: bash
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Deploy Azure resources (Bicep)
        id: bicep
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --template-file infra/uat/main.bicep \
            --parameters \
              location="${{ github.event.inputs.location }}" \
              baseName="${{ github.event.inputs.base_name }}" \
              sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
              sqlDatabaseSkuName="${{ github.event.inputs.sql_database_sku }}" \
            --query "properties.outputs" -o json > bicep-outputs.json
          cat bicep-outputs.json

      - name: Ensure Entra API app registration
        id: api_app
        shell: bash
        env:
          EXISTING_API_CLIENT_ID: ${{ github.event.inputs.existing_api_client_id }}
          EXISTING_SPA_CLIENT_ID: ${{ github.event.inputs.existing_spa_client_id }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.inputs.base_name }}-api"

          # Bring-your-own path: caller passed in pre-created Entra client ids because the
          # workflow's service principal lacks tenant-level Entra rights. We just record the
          # value and defer creating a new client secret (that step also requires Entra rights
          # — the caller will set AZURE_AD_CLIENT_SECRET directly instead).
          if [ -n "$EXISTING_API_CLIENT_ID" ] && [ -n "$EXISTING_SPA_CLIENT_ID" ]; then
            echo "::notice::Using pre-created API Entra app registration $EXISTING_API_CLIENT_ID (skipping az ad app create)."
            echo "app_id=$EXISTING_API_CLIENT_ID" >> "$GITHUB_OUTPUT"
            echo "api_secret_generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$EXISTING_API_CLIENT_ID" ] || [ -n "$EXISTING_SPA_CLIENT_ID" ]; then
            echo "::error::existing_api_client_id and existing_spa_client_id must be provided together (or both left blank)."
            exit 1
          fi

          APP_ID=$(az ad app list --display-name "$NAME" --query "[0].appId" -o tsv)
          if [ -z "$APP_ID" ]; then
            echo "Creating Entra app registration: $NAME"
            APP_ID=$(az ad app create --display-name "$NAME" --sign-in-audience AzureADMyOrg --query appId -o tsv)
            az ad app update --id "$APP_ID" --identifier-uris "api://$APP_ID"

            # Expose the access_as_user delegated scope the API expects (AzureAd__Audience =
            # api://{appId} — see src/LtlTool.Api/appsettings.json).
            SCOPE_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications(appId='$APP_ID')" \
              --body "{\"api\":{\"oauth2PermissionScopes\":[{\"id\":\"$SCOPE_ID\",\"adminConsentDescription\":\"Allow the SPA to call the LTL API as the signed-in user.\",\"adminConsentDisplayName\":\"Access LTL API\",\"userConsentDescription\":\"Allow the app to call the LTL API on your behalf.\",\"userConsentDisplayName\":\"Access LTL API\",\"value\":\"access_as_user\",\"type\":\"User\",\"isEnabled\":true}]}}"

            az ad sp create --id "$APP_ID" >/dev/null

            SECRET=$(az ad app credential reset --id "$APP_ID" --display-name "provisioned-$(date +%Y%m%d)" --years 1 --query password -o tsv)
            echo "::add-mask::$SECRET"
            echo "api_secret_generated=true" >> "$GITHUB_OUTPUT"
            echo "$SECRET" > api-client-secret.txt
          else
            echo "Entra app registration $NAME already exists (appId=$APP_ID) — skipping create/secret rotation."
            echo "api_secret_generated=false" >> "$GITHUB_OUTPUT"
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      # Define the service-to-service app role Yard's managed identity presents on its
      # client-credentials token (roles claim). Idempotent: the role is only appended when a role
      # with the same value is absent, and the full existing appRoles array is preserved on PATCH.
      # Writing appRoles requires ownership / Application.ReadWrite on the app registration; the
      # deploy SP may lack directory-write rights, so (like the admin-consent step below) this is
      # best-effort and surfaces manual instructions rather than aborting the whole provision.
      - name: Ensure YardEvents.Ingest app role on API app registration
        id: yard_role
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          APP_ID="${{ steps.api_app.outputs.app_id }}"
          ROLE_VALUE="YardEvents.Ingest"
          # Stable role id so repeat runs never create a duplicate role definition.
          ROLE_ID="6f3a1c2e-9b74-4d58-8a11-7c2e5d0f4b93"

          EXISTING=$(az ad app show --id "$APP_ID" --query "appRoles" -o json)
          if echo "$EXISTING" | jq -e --arg v "$ROLE_VALUE" 'any(.[]; .value == $v)' >/dev/null; then
            echo "::notice::App role '$ROLE_VALUE' already defined on $APP_ID — nothing to do."
          else
            NEW_ROLE=$(jq -n --arg id "$ROLE_ID" --arg v "$ROLE_VALUE" '{
              id: $id,
              allowedMemberTypes: ["Application"],
              description: "Allows Yard (peer system) to POST freight events to the LTL ingestion endpoint.",
              displayName: "Ingest Yard events",
              isEnabled: true,
              value: $v
            }')
            MERGED=$(echo "$EXISTING" | jq --argjson r "$NEW_ROLE" '. + [$r]')
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications(appId='$APP_ID')" \
              --headers "Content-Type=application/json" \
              --body "$(jq -n --argjson roles "$MERGED" '{appRoles: $roles}')"
            echo "::notice::Defined app role '$ROLE_VALUE' (id=$ROLE_ID) on $APP_ID."
          fi

          # Optionally grant the role to Yard's managed identity so its token carries the roles claim.
          YARD_OID="${{ github.event.inputs.yard_managed_identity_object_id }}"
          if [ -n "$YARD_OID" ]; then
            API_SP_OID=$(az ad sp show --id "$APP_ID" --query id -o tsv)
            # appRoleAssignedTo on the resource SP: principalId = Yard MI, resourceId = API SP,
            # appRoleId = the role id above. Idempotent: swallow the "already exists" conflict.
            if az rest --method POST \
              --uri "https://graph.microsoft.com/v1.0/servicePrincipals/$API_SP_OID/appRoleAssignedTo" \
              --headers "Content-Type=application/json" \
              --body "$(jq -n --arg p "$YARD_OID" --arg r "$API_SP_OID" --arg a "$ROLE_ID" \
                        '{principalId:$p, resourceId:$r, appRoleId:$a}')" 2>/tmp/roleassign.err; then
              echo "::notice::Granted '$ROLE_VALUE' to Yard identity $YARD_OID."
            elif grep -qi "Permission being assigned already exists" /tmp/roleassign.err; then
              echo "::notice::Yard identity $YARD_OID already holds '$ROLE_VALUE' — nothing to do."
            else
              echo "::warning::Could not assign '$ROLE_VALUE' to $YARD_OID:"; cat /tmp/roleassign.err
            fi
          else
            echo "::notice::No yard_managed_identity_object_id supplied — role defined but not assigned."
          fi

      - name: Ensure Entra SPA app registration
        id: spa_app
        shell: bash
        env:
          EXISTING_SPA_CLIENT_ID: ${{ github.event.inputs.existing_spa_client_id }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.inputs.base_name }}-web"

          if [ -n "$EXISTING_SPA_CLIENT_ID" ]; then
            echo "::notice::Using pre-created SPA Entra app registration $EXISTING_SPA_CLIENT_ID (skipping az ad app create)."
            echo "app_id=$EXISTING_SPA_CLIENT_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP_ID=$(az ad app list --display-name "$NAME" --query "[0].appId" -o tsv)
          if [ -z "$APP_ID" ]; then
            echo "Creating Entra app registration: $NAME"
            APP_ID=$(az ad app create --display-name "$NAME" --sign-in-audience AzureADMyOrg --query appId -o tsv)
            az ad sp create --id "$APP_ID" >/dev/null

            # Placeholder SPA redirect URI — must be updated to the real Web app URL after the
            # first deploy: Entra ID -> App registrations -> <base>-web -> Authentication.
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications(appId='$APP_ID')" \
              --body '{"spa":{"redirectUris":["https://localhost"]}}'

            # Microsoft Graph User.Read (delegated) — well-known Graph resource appId + scope id.
            az ad app permission add --id "$APP_ID" \
              --api 00000003-0000-0000-c000-000000000000 \
              --api-permissions e1fe6dd8-ba31-4d61-89e7-88639da4683d=Scope
          else
            echo "Entra app registration $NAME already exists (appId=$APP_ID) — skipping create."
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Attempt admin consent for Microsoft Graph permissions
        id: consent
        continue-on-error: true
        shell: bash
        run: |
          az ad app permission admin-consent --id "${{ steps.spa_app.outputs.app_id }}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## LTL Tool UAT infrastructure provisioned"
            echo ""
            echo "Resource group: \`${{ github.event.inputs.resource_group }}\`"
            echo ""
            echo "| Output | Value |"
            echo "| --- | --- |"
            jq -r 'to_entries[] | "| \(.key) | \(.value.value) |"' bicep-outputs.json
            echo ""
            echo "### Entra app registrations"
            echo "- API app registration client ID: \`${{ steps.api_app.outputs.app_id }}\`"
            echo "- SPA app registration client ID: \`${{ steps.spa_app.outputs.app_id }}\`"
            if [ "${{ steps.yard_role.outcome }}" != "success" ]; then
              echo "- ⚠️ The \`YardEvents.Ingest\` app role could not be defined/assigned automatically"
              echo "  (the pipeline's service principal likely lacks Entra app-registration write"
              echo "  rights). Define it manually: Entra ID → App registrations → ${{ github.event.inputs.base_name }}-api"
              echo "  → App roles → Create app role (Value \`YardEvents.Ingest\`, member type Applications),"
              echo "  then grant it to Yard's managed identity."
            else
              echo "- \`YardEvents.Ingest\` app role ensured on the API app registration."
            fi
            if [ "${{ steps.api_app.outputs.api_secret_generated }}" = "true" ]; then
              echo "- A new API client secret was generated (masked in logs) — see the"
              echo "  \`api-client-secret\` artifact from this run. **It will not be shown again;**"
              echo "  re-running this workflow will not regenerate it."
            else
              echo "- API app registration already existed; no new secret was generated."
            fi
            if [ "${{ steps.consent.outcome }}" != "success" ]; then
              echo "- ⚠️ Admin consent for the Microsoft Graph User.Read permission could not be"
              echo "  granted automatically (the pipeline's service principal likely lacks Entra"
              echo "  admin rights). Grant it manually: Entra ID → App registrations →"
              echo "  ${{ github.event.inputs.base_name }}-web → API permissions → Grant admin consent."
            else
              echo "- Microsoft Graph User.Read admin consent granted."
            fi
            echo ""
            echo "### Next steps (manual — this workflow never writes GitHub secrets)"
            echo "1. Download the \`api-client-secret\` artifact and store it as the"
            echo "   \`AZURE_AD_CLIENT_SECRET\` secret in the \`uat\` GitHub environment, then delete the artifact."
            echo "2. Set \`AZURE_AD_API_CLIENT_ID\`, \`AZURE_AD_WEB_CLIENT_ID\`, \`AZURE_AD_TENANT_ID\` from"
            echo "   the values above."
            echo "3. Run **Actions → Deploy LTL Tool UAT** — it builds the API/Web images, pushes them to"
            echo "   the ACR above, and configures both apps (including the SQL connection string, built"
            echo "   from the SQL server FQDN above plus \`SQL_ADMIN_PASSWORD\`)."
            echo "4. After the first deploy, copy the Web URL from its summary and add it to the SPA app"
            echo "   registration's redirect URIs (Entra ID → App registrations →"
            echo "   ${{ github.event.inputs.base_name }}-web → Authentication), then re-run the deploy"
            echo "   workflow so the app's own CORS/redirect settings pick up the final URL too."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API client secret artifact
        if: steps.api_app.outputs.api_secret_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-client-secret
          path: api-client-secret.txt
          retention-days: 1
