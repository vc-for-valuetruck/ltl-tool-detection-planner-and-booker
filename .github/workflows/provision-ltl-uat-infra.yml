name: Provision LTL Tool UAT infrastructure

# Manual-trigger only. This workflow creates real Azure resources and real Microsoft Entra
# app registrations — it must never run on push/PR. Re-running is safe for the ARM-managed
# resources (infra/uat/main.bicep is idempotent) and for the Entra app registrations (skipped if
# an app with the same display name already exists), but it does NOT rotate an existing API
# client secret on repeat runs, so a secret is only ever generated once per app.
on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: UAT resource group
        required: true
        default: ltl-uat-rg
        type: string
      location:
        description: Azure region
        required: true
        default: centralus
        type: string
      base_name:
        description: Base name for UAT resources
        required: true
        default: ltl-uat
        type: string
      sql_database_sku:
        description: 'Azure SQL Database SKU (e.g. Basic, S0, S1)'
        required: false
        default: S0
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: provision-ltl-uat-infra
  cancel-in-progress: false

jobs:
  provision:
    name: Provision UAT infrastructure + Entra app registrations
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Azure login with ltl-uat-github-deploy
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        shell: bash
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Deploy Azure resources (Bicep)
        id: bicep
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --template-file infra/uat/main.bicep \
            --parameters \
              location="${{ github.event.inputs.location }}" \
              baseName="${{ github.event.inputs.base_name }}" \
              sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
              sqlDatabaseSkuName="${{ github.event.inputs.sql_database_sku }}" \
            --query "properties.outputs" -o json > bicep-outputs.json
          cat bicep-outputs.json

      - name: Ensure Entra API app registration
        id: api_app
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ github.event.inputs.base_name }}-api"
          APP_ID=$(az ad app list --display-name "$NAME" --query "[0].appId" -o tsv)
          if [ -z "$APP_ID" ]; then
            echo "Creating Entra app registration: $NAME"
            APP_ID=$(az ad app create --display-name "$NAME" --sign-in-audience AzureADMyOrg --query appId -o tsv)
            az ad app update --id "$APP_ID" --identifier-uris "api://$APP_ID"

            # Expose the access_as_user delegated scope the API expects (AzureAd__Audience =
            # api://{appId} — see src/LtlTool.Api/appsettings.json).
            SCOPE_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications(appId='$APP_ID')" \
              --body "{\"api\":{\"oauth2PermissionScopes\":[{\"id\":\"$SCOPE_ID\",\"adminConsentDescription\":\"Allow the SPA to call the LTL API as the signed-in user.\",\"adminConsentDisplayName\":\"Access LTL API\",\"userConsentDescription\":\"Allow the app to call the LTL API on your behalf.\",\"userConsentDisplayName\":\"Access LTL API\",\"value\":\"access_as_user\",\"type\":\"User\",\"isEnabled\":true}]}}"

            az ad sp create --id "$APP_ID" >/dev/null

            SECRET=$(az ad app credential reset --id "$APP_ID" --display-name "provisioned-$(date +%Y%m%d)" --years 1 --query password -o tsv)
            echo "::add-mask::$SECRET"
            echo "api_secret_generated=true" >> "$GITHUB_OUTPUT"
            echo "$SECRET" > api-client-secret.txt
          else
            echo "Entra app registration $NAME already exists (appId=$APP_ID) — skipping create/secret rotation."
            echo "api_secret_generated=false" >> "$GITHUB_OUTPUT"
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Ensure Entra SPA app registration
        id: spa_app
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ github.event.inputs.base_name }}-web"
          APP_ID=$(az ad app list --display-name "$NAME" --query "[0].appId" -o tsv)
          if [ -z "$APP_ID" ]; then
            echo "Creating Entra app registration: $NAME"
            APP_ID=$(az ad app create --display-name "$NAME" --sign-in-audience AzureADMyOrg --query appId -o tsv)
            az ad sp create --id "$APP_ID" >/dev/null

            # Placeholder SPA redirect URI — must be updated to the real Web app URL after the
            # first deploy: Entra ID -> App registrations -> <base>-web -> Authentication.
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications(appId='$APP_ID')" \
              --body '{"spa":{"redirectUris":["https://localhost"]}}'

            # Microsoft Graph User.Read (delegated) — well-known Graph resource appId + scope id.
            az ad app permission add --id "$APP_ID" \
              --api 00000003-0000-0000-c000-000000000000 \
              --api-permissions e1fe6dd8-ba31-4d61-89e7-88639da4683d=Scope
          else
            echo "Entra app registration $NAME already exists (appId=$APP_ID) — skipping create."
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Attempt admin consent for Microsoft Graph permissions
        id: consent
        continue-on-error: true
        shell: bash
        run: |
          az ad app permission admin-consent --id "${{ steps.spa_app.outputs.app_id }}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## LTL Tool UAT infrastructure provisioned"
            echo ""
            echo "Resource group: \`${{ github.event.inputs.resource_group }}\`"
            echo ""
            echo "| Output | Value |"
            echo "| --- | --- |"
            jq -r 'to_entries[] | "| \(.key) | \(.value.value) |"' bicep-outputs.json
            echo ""
            echo "### Entra app registrations"
            echo "- API app registration client ID: \`${{ steps.api_app.outputs.app_id }}\`"
            echo "- SPA app registration client ID: \`${{ steps.spa_app.outputs.app_id }}\`"
            if [ "${{ steps.api_app.outputs.api_secret_generated }}" = "true" ]; then
              echo "- A new API client secret was generated (masked in logs) — see the"
              echo "  \`api-client-secret\` artifact from this run. **It will not be shown again;**"
              echo "  re-running this workflow will not regenerate it."
            else
              echo "- API app registration already existed; no new secret was generated."
            fi
            if [ "${{ steps.consent.outcome }}" != "success" ]; then
              echo "- ⚠️ Admin consent for the Microsoft Graph User.Read permission could not be"
              echo "  granted automatically (the pipeline's service principal likely lacks Entra"
              echo "  admin rights). Grant it manually: Entra ID → App registrations →"
              echo "  ${{ github.event.inputs.base_name }}-web → API permissions → Grant admin consent."
            else
              echo "- Microsoft Graph User.Read admin consent granted."
            fi
            echo ""
            echo "### Next steps (manual — this workflow never writes GitHub secrets)"
            echo "1. Download the \`api-client-secret\` artifact and store it as the"
            echo "   \`AZURE_AD_CLIENT_SECRET\` secret in the \`uat\` GitHub environment, then delete the artifact."
            echo "2. Set \`AZURE_AD_API_CLIENT_ID\`, \`AZURE_AD_WEB_CLIENT_ID\`, \`AZURE_AD_TENANT_ID\` from"
            echo "   the values above."
            echo "3. Run **Actions → Deploy LTL Tool UAT** — it builds the API/Web images, pushes them to"
            echo "   the ACR above, and configures both apps (including the SQL connection string, built"
            echo "   from the SQL server FQDN above plus \`SQL_ADMIN_PASSWORD\`)."
            echo "4. After the first deploy, copy the Web URL from its summary and add it to the SPA app"
            echo "   registration's redirect URIs (Entra ID → App registrations →"
            echo "   ${{ github.event.inputs.base_name }}-web → Authentication), then re-run the deploy"
            echo "   workflow so the app's own CORS/redirect settings pick up the final URL too."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API client secret artifact
        if: steps.api_app.outputs.api_secret_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-client-secret
          path: api-client-secret.txt
          retention-days: 1
