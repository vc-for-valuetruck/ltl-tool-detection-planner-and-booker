name: Verify Alvys sign-off gate

# Read-only guardrail. Asserts, in the repository itself, that the Alvys production
# writeback gate stays fail-closed:
#   1. AllowProduction defaults to false in code.
#   2. The production base-URL predicate still requires the real production host
#      (inverse of the sandbox rule).
#   3. Reports whether any sign-off row in docs/ltl-tool.md has been filled, so an
#      operator can confirm the human approval state before enabling production.
#
# This workflow performs NO Alvys call and touches NO deployment. It only inspects
# source and docs. It fails if the code defaults regress toward an unsafe posture.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/LtlTool.Api/Features/Integrations/Alvys/Writeback/AlvysWriteOptions.cs"
      - "docs/ltl-tool.md"
      - ".github/workflows/verify-alvys-signoff-gate.yml"

permissions:
  contents: read

concurrency:
  group: verify-alvys-signoff-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-gate:
    name: Assert production gate is fail-closed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert AllowProduction defaults to false
        shell: bash
        run: |
          set -euo pipefail
          OPTIONS=src/LtlTool.Api/Features/Integrations/Alvys/Writeback/AlvysWriteOptions.cs
          if ! grep -Eq 'AllowProduction\s*\{\s*get;\s*set;\s*\}\s*=\s*false;' "$OPTIONS"; then
            echo "::error::AllowProduction no longer defaults to false in $OPTIONS"
            exit 1
          fi
          echo "::notice::AllowProduction defaults to false"

      - name: Assert production base URL still requires the real production host
        shell: bash
        run: |
          set -euo pipefail
          OPTIONS=src/LtlTool.Api/Features/Integrations/Alvys/Writeback/AlvysWriteOptions.cs
          # HasProductionBaseUrl must REQUIRE integrations.alvys.com (no leading '!').
          if ! grep -Eq 'ProductionBaseUrl\.Contains\("integrations\.alvys\.com"' "$OPTIONS"; then
            echo "::error::HasProductionBaseUrl no longer requires the production host"
            exit 1
          fi
          # The sandbox predicate must still REJECT it (leading '!').
          if ! grep -Eq '!SandboxBaseUrl\.Contains\("integrations\.alvys\.com"' "$OPTIONS"; then
            echo "::error::HasSandboxBaseUrl no longer rejects the production host"
            exit 1
          fi
          echo "::notice::production requires prod host; sandbox rejects it"

      - name: Report sign-off row state (informational)
        shell: bash
        run: |
          set -euo pipefail
          DOC=docs/ltl-tool.md
          echo "----- Sign-off rows in $DOC -----"
          # Rows whose 'Approved by' cell still reads _(pending...)_ are unsigned.
          PENDING=$(grep -c '_(pending' "$DOC" || true)
          echo "  rows still pending human approval: $PENDING"
          if [ "$PENDING" -gt 0 ]; then
            echo "::notice::$PENDING sign-off row(s) pending — production must stay disabled until filled"
          else
            echo "::warning::no pending sign-off rows found — verify a real approver/date was recorded, not a self-filled row"
          fi
