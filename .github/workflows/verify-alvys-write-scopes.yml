name: Verify Alvys write scopes

# Read-only diagnostic. Resolves Alvys OAuth client credentials (from GitHub
# secrets when present, otherwise from the ltl-uat-api app settings via Azure
# OIDC), fetches a client_credentials token, and prints ONLY the decoded scope
# claim. Performs NO Alvys write. The token and credentials are masked.

on:
  workflow_dispatch:
    inputs:
      audience:
        description: "OAuth audience"
        required: false
        default: "https://api.alvys.com/public/"
      token_url:
        description: "OAuth token endpoint"
        required: false
        default: "https://auth.alvys.com/oauth/token"

permissions:
  contents: read
  id-token: write

concurrency:
  group: verify-alvys-write-scopes
  cancel-in-progress: false

jobs:
  verify-scopes:
    name: Fetch token and print decoded scope claim only
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Azure login (LTL UAT OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve credentials and decode scope claim
        shell: bash
        env:
          SECRET_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          SECRET_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          AUDIENCE: ${{ inputs.audience }}
          TOKEN_URL: ${{ inputs.token_url }}
        run: |
          set -euo pipefail

          ALVYS_CLIENT_ID="${SECRET_CLIENT_ID:-}"
          ALVYS_CLIENT_SECRET="${SECRET_CLIENT_SECRET:-}"

          if [ -z "$ALVYS_CLIENT_ID" ] || [ -z "$ALVYS_CLIENT_SECRET" ]; then
            echo "GitHub secrets incomplete; reading Alvys credentials from ltl-uat-api app settings..."
            SETTINGS=$(az webapp config appsettings list -g ltl-uat-rg -n ltl-uat-api -o json --only-show-errors)
            echo "Alvys-related app setting NAMES on ltl-uat-api (values not shown):"
            printf '%s' "$SETTINGS" | jq -r '.[].name | select(test("alvys"; "i"))' || true
            echo "Alvys setting value diagnostics (length + keyvault-ref flag only):"
            printf '%s' "$SETTINGS" | jq -r '.[] | select(.name | test("alvys"; "i")) | "\(.name): len=\((.value // "") | length) kvref=\((.value // "") | startswith("@Microsoft.KeyVault"))"' || true
            kv_resolve() {
              local raw="$1"
              if printf '%s' "$raw" | grep -q '^@Microsoft.KeyVault'; then
                local uri
                uri=$(printf '%s' "$raw" | sed -n 's/.*SecretUri=\([^);]*\).*/\1/p')
                az keyvault secret show --id "$uri" --query value -o tsv --only-show-errors
              else
                printf '%s' "$raw"
              fi
            }
            if [ -z "$ALVYS_CLIENT_ID" ]; then
              RAW_ID=$(printf '%s' "$SETTINGS" | jq -r '[.[] | select(.name | test("alvys.*client.?id$"; "i"))][0].value // empty')
              ALVYS_CLIENT_ID=$(kv_resolve "$RAW_ID")
            fi
            if [ -z "$ALVYS_CLIENT_SECRET" ]; then
              RAW_SECRET=$(printf '%s' "$SETTINGS" | jq -r '[.[] | select(.name | test("alvys.*client.?secret$"; "i"))][0].value // empty')
              ALVYS_CLIENT_SECRET=$(kv_resolve "$RAW_SECRET")
            fi
            ALVYS_TENANT_ID=$(printf '%s' "$SETTINGS" | jq -r '[.[] | select(.name | test("alvys.*tenant.?id$"; "i"))][0].value // empty')
            echo "resolved: client_id len=${#ALVYS_CLIENT_ID}, client_secret len=${#ALVYS_CLIENT_SECRET}, tenant_id len=${#ALVYS_TENANT_ID}"
          fi

          if [ -z "$ALVYS_CLIENT_ID" ] || [ -z "$ALVYS_CLIENT_SECRET" ]; then
            echo "::error::could not resolve Alvys client credentials from secrets or app settings"
            exit 1
          fi
          echo "::add-mask::$ALVYS_CLIENT_ID"
          echo "::add-mask::$ALVYS_CLIENT_SECRET"

          RESP=$(curl -sS --fail-with-body -X POST "$TOKEN_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"client_id\":\"${ALVYS_CLIENT_ID}\",\"client_secret\":\"${ALVYS_CLIENT_SECRET}\",\"audience\":\"${AUDIENCE}\",\"grant_type\":\"client_credentials\"}") \
            || { echo "::error::token request failed"; exit 1; }

          TOKEN=$(printf '%s' "$RESP" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::no access_token in token response"
            exit 1
          fi
          echo "::add-mask::$TOKEN"

          SCOPES=$(printf '%s' "$TOKEN" | python3 -c 'import sys,base64,json; p=sys.stdin.read().strip().split(".")[1]; p+="="*(-len(p)%4); c=json.loads(base64.urlsafe_b64decode(p)); s=c.get("scope") or (" ".join(c.get("scp")) if isinstance(c.get("scp"),list) else c.get("scp") or ""); print(s)')

          echo "::notice::decoded scope claim printed below (token itself is masked and never shown)"
          echo "----- Alvys token scopes -----"
          printf '%s\n' "$SCOPES" | tr ' ' '\n' | sed '/^$/d' | sort

          echo "----- Presence check for the write scopes the writeback lifecycle needs -----"
          for want in load:create load:update trip:create document; do
            if printf '%s' "$SCOPES" | tr ' ' '\n' | grep -qix "$want"; then
              echo "  present : $want"
            else
              echo "  MISSING : $want"
            fi
          done
