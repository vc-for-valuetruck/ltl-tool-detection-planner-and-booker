name: ltl-tool-detection-planner-and-booker

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ltl-tool-detection-planner-and-booker-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_Password123!}"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: >
        /bin/bash -c '
        if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
          /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null;
        elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then
          /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null;
        else
          timeout 1 bash -c "</dev/tcp/localhost/1433";
        fi'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: src/LtlTool.Api/Dockerfile
    image: ltl-tool-detection-planner-and-booker-api:local
    container_name: ltl-tool-detection-planner-and-booker-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      # AccessPolicy__Mode: EntraId (default) or Demo. Demo mode grants every request a
      # synthetic identity so the tool runs against real Alvys reads without an Entra
      # tenant. Set ACCESS_POLICY_MODE=Demo in .env for a local demo.
      AccessPolicy__Mode: "${ACCESS_POLICY_MODE:-EntraId}"
      AzureAd__TenantId: "${AZURE_AD_TENANT_ID:-}"
      AzureAd__ClientId: "${AZURE_AD_API_CLIENT_ID:-}"
      AzureAd__ClientSecret: "${AZURE_AD_CLIENT_SECRET:-}"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      AzureAd__Audience: "api://${AZURE_AD_API_CLIENT_ID:-00000000-0000-0000-0000-000000000000}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=LtlTool;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Password123!};Encrypt=False;TrustServerCertificate=True"
      Cors__AllowedOrigins__0: "http://localhost:4200"
      # Empty allow-list = any authenticated caller admitted; demo mode's synthetic
      # identity uses @valuetruck.com so an allow-list of valuetruck.com also works.
      AccessPolicy__AllowedEmailDomains__0: "${ALLOWED_EMAIL_DOMAIN:-}"
      ExternalApi__BaseUrl: "${EXTERNAL_API_BASE_URL:-}"
      ExternalApi__ApiKey: "${EXTERNAL_API_KEY:-}"
      # Alvys TMS — API only, never surfaced to the SPA.
      # Live is the default source of truth; set ALVYS_PROVIDER=Fallback for
      # local/UAT runs without a live tenant.
      Alvys__Provider: "${ALVYS_PROVIDER:-Live}"
      Alvys__ApiBaseUrl: "${ALVYS_API_BASE_URL:-https://integrations.alvys.com}"
      Alvys__ApiVersion: "${ALVYS_API_VERSION:-v1}"
      Alvys__TenantId: "${ALVYS_TENANT_ID:-}"
      Alvys__ClientId: "${ALVYS_CLIENT_ID:-}"
      Alvys__ClientSecret: "${ALVYS_CLIENT_SECRET:-}"
      # Alvys writeback boundary — sandbox-gated, Disabled by default. No live Alvys
      # mutation is performed in this phase regardless of mode.
      Alvys__Writeback__Mode: "${ALVYS_WRITEBACK_MODE:-Disabled}"
      Alvys__Writeback__Environment: "${ALVYS_WRITEBACK_ENVIRONMENT:-}"
      Alvys__Writeback__SandboxBaseUrl: "${ALVYS_WRITEBACK_SANDBOX_BASE_URL:-}"
      # LTL app settings.
      Ltl__DetectionEnabled: "${LTL_DETECTION_ENABLED:-false}"
      Ltl__DefaultTimezone: "${LTL_DEFAULT_TIMEZONE:-America/Chicago}"
    ports:
      - "5072:8080"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: ltl-tool-detection-planner-and-booker-web:local
    container_name: ltl-tool-detection-planner-and-booker-web
    depends_on:
      - api
    environment:
      API_UPSTREAM: "http://api:8080"
      # In demo mode leave the tenant/client/scope empty and the Angular app's
      # isAuthConfigured() check will suppress MSAL entirely — the SPA calls the API
      # without an Authorization header, and the API's DemoAuthenticationHandler admits
      # the request under a synthetic identity.
      RUNTIME_TENANT_ID: "${AZURE_AD_TENANT_ID:-}"
      RUNTIME_WEB_CLIENT_ID: "${AZURE_AD_WEB_CLIENT_ID:-}"
      RUNTIME_API_SCOPE: "${AZURE_AD_API_SCOPE:-}"
      RUNTIME_API_BASE_URL: "/api"
    ports:
      - "4200:80"

volumes:
  sqlserver-data:
