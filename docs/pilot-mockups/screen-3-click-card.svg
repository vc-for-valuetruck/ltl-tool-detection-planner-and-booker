<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1400" height="900" fill="#f7f8fa"/>

  <!-- Nav -->
  <rect x="0" y="0" width="1400" height="56" fill="#1e293b"/>
  <text x="24" y="35" font-size="16" font-weight="600" fill="#ffffff">Value Truck · LTL Tool</text>
  <text x="1280" y="35" font-size="13" fill="#94a3b8">joshua.davis@valuetruck.com</text>

  <rect x="0" y="56" width="1400" height="48" fill="#ffffff"/>
  <line x1="0" y1="104" x2="1400" y2="104" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="85" font-size="14" fill="#64748b">Search</text>
  <text x="100" y="85" font-size="14" fill="#64748b">Billing</text>
  <text x="180" y="85" font-size="14" fill="#64748b">Exceptions</text>
  <text x="285" y="85" font-size="14" font-weight="700" fill="#0f172a">Consolidate</text>
  <rect x="270" y="98" width="110" height="3" fill="#2563eb"/>

  <!-- Title -->
  <text x="24" y="140" font-size="12" fill="#94a3b8">Consolidate · Candidates · Plan detail · </text>
  <text x="325" y="140" font-size="12" fill="#2563eb">Click card</text>
  <text x="24" y="175" font-size="24" font-weight="700" fill="#0f172a">Alvys click card · plan-2026-07-16-c14</text>
  <text x="24" y="200" font-size="13" fill="#64748b">Copy this into a note, print it, or dispatch it to the operator. The tool has recorded the plan as an audit entry.</text>

  <!-- The card itself -->
  <rect x="24" y="228" width="880" height="600" rx="10" fill="#0f172a"/>

  <!-- Card header -->
  <rect x="24" y="228" width="880" height="70" rx="10" fill="#1e293b"/>
  <text x="52" y="258" font-size="16" font-weight="700" fill="#f8fafc">LTL CONSOLIDATION PLAN</text>
  <text x="52" y="280" font-size="13" fill="#94a3b8">Corridor · Laredo → Dallas · Read-only Phase 1</text>

  <rect x="750" y="248" width="130" height="34" rx="17" fill="#22c55e"/>
  <text x="815" y="270" font-size="12" font-weight="700" fill="#052e16" text-anchor="middle">Copy to clipboard</text>

  <!-- Card body — monospace click steps -->
  <text x="52" y="330" font-size="13" font-weight="700" fill="#22d3ee" font-family="Menlo, Consolas, monospace">Parent load:    L-100234    Verdef → Goodyear, AZ</text>
  <text x="52" y="350" font-size="13" font-weight="700" fill="#22d3ee" font-family="Menlo, Consolas, monospace">Sibling loads:  L-100241    Masonite → Phoenix, AZ</text>

  <line x1="52" y1="368" x2="870" y2="368" stroke="#334155"/>

  <text x="52" y="395" font-size="13" font-weight="700" fill="#f8fafc" font-family="Menlo, Consolas, monospace">Step 1 · Open parent load L-100234 in Alvys</text>
  <text x="80" y="418" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ Assign driver, truck, trailer as normal</text>
  <text x="80" y="438" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ Add stop → Waypoint for each sibling delivery</text>
  <text x="80" y="458" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ In Trip References, add:</text>
  <text x="120" y="478" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">LTL = true</text>
  <text x="120" y="498" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">Main Load Id = L-100234</text>

  <text x="52" y="530" font-size="13" font-weight="700" fill="#f8fafc" font-family="Menlo, Consolas, monospace">Step 2 · Open sibling load L-100241 in Alvys</text>
  <text x="80" y="553" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ Assign the SAME driver, truck, trailer as L-100234</text>
  <text x="80" y="573" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ Dispatch language panel (left) → Loaded miles → set to 0</text>
  <text x="80" y="593" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ In Trip References, add:</text>
  <text x="120" y="613" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">LTL = true</text>
  <text x="120" y="633" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">Main Load Id = L-100234</text>

  <text x="52" y="665" font-size="13" font-weight="700" fill="#f8fafc" font-family="Menlo, Consolas, monospace">Step 3 · View combined RPM</text>
  <text x="80" y="688" font-size="12" fill="#cbd5e1" font-family="Menlo, Consolas, monospace">→ Trips report → Filter →</text>
  <text x="120" y="708" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">Trip References contain "LTL = true" AND</text>
  <text x="120" y="728" font-size="12" fill="#67e8f9" font-family="Menlo, Consolas, monospace">"Main Load Id = L-100234"</text>

  <line x1="52" y1="748" x2="870" y2="748" stroke="#334155"/>

  <text x="52" y="775" font-size="12" fill="#94a3b8" font-family="Menlo, Consolas, monospace">Projected combined revenue: $8,200</text>
  <text x="52" y="795" font-size="12" fill="#94a3b8" font-family="Menlo, Consolas, monospace">Projected linehaul miles:   1,072</text>
  <text x="52" y="815" font-size="12" fill="#22c55e" font-family="Menlo, Consolas, monospace" font-weight="700">Projected combined RPM:     $7.65 / mi</text>

  <!-- Right column: what the tool did / did not do -->
  <rect x="920" y="228" width="456" height="290" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="940" y="256" font-size="14" font-weight="700" fill="#0f172a">What the tool did</text>
  <line x1="940" y1="270" x2="1356" y2="270" stroke="#e2e8f0"/>
  <text x="940" y="295" font-size="12" fill="#059669">✓ Recorded plan-2026-07-16-c14 in the audit trail</text>
  <text x="940" y="317" font-size="12" fill="#059669">✓ Computed projected combined RPM from Alvys rates</text>
  <text x="940" y="339" font-size="12" fill="#059669">✓ Verified corridor: Laredo origin, Dallas re-split, US-only</text>
  <text x="940" y="361" font-size="12" fill="#059669">✓ Checked customer allow-flags (Verdef, Masonite = notify)</text>
  <text x="940" y="383" font-size="12" fill="#059669">✓ Generated the copy-pasteable click card above</text>
  <line x1="940" y1="400" x2="1356" y2="400" stroke="#e2e8f0"/>
  <text x="940" y="425" font-size="14" font-weight="700" fill="#0f172a">What the tool did NOT do</text>
  <text x="940" y="450" font-size="12" fill="#94a3b8">— Write anything to Alvys (Phase 1 is read-only)</text>
  <text x="940" y="472" font-size="12" fill="#94a3b8">— Assign a driver, truck, or trailer</text>
  <text x="940" y="494" font-size="12" fill="#94a3b8">— Zero out loaded miles on siblings automatically</text>
  <text x="940" y="516" font-size="12" fill="#94a3b8">— Contact the customer</text>

  <!-- Right column: next action -->
  <rect x="920" y="536" width="456" height="180" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="940" y="564" font-size="14" font-weight="700" fill="#1e3a8a">Next steps</text>
  <text x="940" y="590" font-size="12" fill="#1e40af">1. Notify Masonite account owner of the consolidation</text>
  <text x="940" y="612" font-size="12" fill="#1e40af">2. Confirm L-100237 pallet count at Laredo dock</text>
  <text x="940" y="634" font-size="12" fill="#1e40af">3. Execute the 3 steps in Alvys per the click card</text>
  <text x="940" y="656" font-size="12" fill="#1e40af">4. Trailer runs Laredo → Dallas → AZ split</text>
  <text x="940" y="678" font-size="12" fill="#1e40af">5. On delivery, re-open this plan and mark completed</text>
  <text x="940" y="700" font-size="11" fill="#64748b">All 5 steps are manual today. Phase 2 automates steps 3–5.</text>

  <!-- Right column: recorded audit -->
  <rect x="920" y="734" width="456" height="94" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="940" y="762" font-size="14" font-weight="700" fill="#78350f">Audit record</text>
  <text x="940" y="785" font-size="11" fill="#78350f">Plan id: plan-2026-07-16-c14</text>
  <text x="940" y="803" font-size="11" fill="#78350f">Recorded by joshua.davis @ 2026-07-16 10:38 MDT</text>
  <text x="940" y="821" font-size="11" fill="#78350f">Uplift claim visible to leadership at any time</text>

  <!-- Footer -->
  <text x="24" y="878" font-size="11" fill="#94a3b8">Everything on this screen was computed from live Alvys data. No values fabricated. Read-only Phase 1.</text>
</svg>
