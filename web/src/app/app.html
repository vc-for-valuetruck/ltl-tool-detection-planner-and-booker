@if (showShell()) {
  <header class="shell-header">
    <span class="shell-brand">Value Truck &middot; LTL Tool</span>
    <span class="shell-user" [class.shell-user-demo]="!authConfigured">
      @if (!authConfigured) {
        <span class="shell-demo-dot" aria-hidden="true"></span>
        <span>{{ demoEmail }}</span>
        <span class="shell-demo-label">Demo mode</span>
      } @else {
        <span>{{ demoEmail }}</span>
      }
    </span>
  </header>
}

<main class="shell-main" [class.shell-main-bare]="!showShell()">
  <router-outlet />
</main>

<!-- Global Demo Director overlay: rendered once here so it persists across every route change the
     director drives. Invisible until DemoDirectorService.active(). -->
<app-demo-director-overlay />
