@if (showShell()) {
  <header class="shell-header">
    <span class="shell-brand">Value Truck &middot; LTL Tool</span>
    <span class="shell-user" [class.shell-user-demo]="!authConfigured">
      @if (!authConfigured) {
        <span class="shell-demo-dot" aria-hidden="true"></span>
        <span>{{ displayEmail() }}</span>
        <span class="shell-demo-label">Demo mode</span>
      } @else {
        <span>{{ displayEmail() }}</span>
      }
    </span>
  </header>
}

<main class="shell-main" [class.shell-main-bare]="!showShell()">
  <router-outlet />
</main>

<!-- App-owned overlay outlet: rendered once here so a mounted overlay persists across every route
     change. Isolated features register their overlay via OverlayOutletService (the Demo Director
     mounts its spotlight overlay when its launcher route loads). Null → nothing renders. The app
     root deliberately does NOT import any feature overlay directly — see OverlayOutletService. -->
<ng-container *ngComponentOutlet="overlayOutlet.component()" />
